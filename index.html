<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAK AI 2.0</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
    body{min-height:100vh;background:radial-gradient(circle at top,#3a0505,#080808 45%,#000);color:#fff}
    .app{max-width:560px;margin:0 auto;min-height:100vh;padding:22px 18px 90px;display:flex;flex-direction:column;gap:18px}
    .hero{text-align:center;padding-top:10px}.orb{width:108px;height:108px;margin:0 auto 16px;border-radius:50%;background:radial-gradient(circle at 30% 25%,#ff5a32,#9d0808 55%,#250000);box-shadow:0 0 45px rgba(255,42,20,.55);display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:900}.hero h1{font-size:42px;letter-spacing:9px}.sub{margin-top:10px;color:#ddd;font-size:16px}.ver{margin-top:8px;color:#aaa;font-size:14px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.tab{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#fff;border-radius:18px;padding:15px 8px;font-size:16px;font-weight:700}.tab.active{background:#ff321c;border-color:#ff321c;box-shadow:0 0 18px rgba(255,50,28,.35)}.panel{display:none}.panel.active{display:block}.card{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:16px;min-height:470px;box-shadow:inset 0 0 35px rgba(255,255,255,.02)}.chatbox{height:440px;overflow:auto;padding:4px;display:flex;flex-direction:column;gap:12px}.msg{max-width:88%;padding:14px 16px;border-radius:18px;line-height:1.35;font-size:16px}.bot{align-self:flex-start;background:rgba(255,255,255,.12)}.user{align-self:flex-end;background:#ff321c}.inputbar{position:fixed;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);border-top:1px solid rgba(255,255,255,.12);padding:12px;display:flex;gap:8px;max-width:560px;margin:0 auto}.inputbar input{flex:1;background:#171717;color:#fff;border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:14px;font-size:15px}.inputbar button,.primary{border:0;background:#ff321c;color:#fff;border-radius:18px;padding:14px 16px;font-size:15px;font-weight:800}.mic{min-width:56px}.field{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}.field label{color:#ccc;font-weight:700}.field input,.field textarea{background:#151515;color:#fff;border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:14px;font-size:15px}.field textarea{min-height:110px}.memory-item{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);padding:14px;border-radius:16px;margin-bottom:10px}.small{font-size:13px;color:#aaa;margin-top:8px}.danger{background:#2a2a2a;margin-top:10px;width:100%}
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="orb">D</div>
      <h1>DRAK AI</h1>
      <div class="sub">Seu assistente inteligente, ensinavel e com voz</div>
      <div class="ver">Versão 2.0 Criado por Bueno Invest</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="openTab('chat')">Chat</button>
      <button class="tab" onclick="openTab('teach')">Ensinar</button>
      <button class="tab" onclick="openTab('memory')">Memoria</button>
    </div>

    <section id="chat" class="panel active">
      <div class="card"><div id="chatbox" class="chatbox"></div></div>
    </section>

    <section id="teach" class="panel">
      <div class="card">
        <div class="field"><label>Pergunta ou comando</label><input id="teachQ" placeholder="Ex: Drak, qual Ã© a meta de junho?"></div>
        <div class="field"><label>Resposta correta</label><textarea id="teachA" placeholder="Ex: A meta de junho Ã© 720 casais e R$ 15 milhÃµes de VGV."></textarea></div>
        <button class="primary" onclick="teachDrak()">Ensinar o Drak</button>
        <div class="small">O Drak salva no proprio celular. Depois conectaremos Firebase para salvar na nuvem.</div>
      </div>
    </section>

    <section id="memory" class="panel">
      <div class="card">
        <div id="memoryList"></div>
        <button class="primary danger" onclick="clearMemory()">Apagar memÃ³ria local</button>
      </div>
    </section>
  </div>

  <div class="inputbar">
    <button class="mic" onclick="listen()">ðŸŽ™ï¸</button>
    <input id="userInput" placeholder="Fale ou digite: Drak, qual a missão de hoje?" onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">Enviar</button>
  </div>

<script>
const KEY='drak_memory_v2';
let memory=JSON.parse(localStorage.getItem(KEY)||'[]');
const chatbox=document.getElementById('chatbox');
function save(){localStorage.setItem(KEY,JSON.stringify(memory));renderMemory()}
function addMsg(text,who='bot'){const d=document.createElement('div');d.className='msg '+who;d.textContent=text;chatbox.appendChild(d);chatbox.scrollTop=chatbox.scrollHeight;if(who==='bot')speak(text)}
function normalize(t){return (t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}
function answer(q){let nq=normalize(q);for(const item of memory){if(nq.includes(normalize(item.q))||normalize(item.q).includes(nq))return item.a}if(nq.includes('quem e voce')||nq.includes('o que voce e'))return 'Eu sou o DRAK AI, seu assistente inteligente. Posso aprender com vocÃª, responder comandos e futuramente controlar seus projetos.';if(nq.includes('meta'))return 'Ainda nÃ£o tenho essa meta salva. VÃ¡ na aba Ensinar e cadastre a resposta correta para eu lembrar.';if(nq.includes('capta')||nq.includes('venda'))return 'Posso ajudar com captaÃ§Ã£o, vendas, ranking, discurso, relatÃ³rios e anÃ¡lise de equipe. Me ensine suas regras para eu ficar cada vez melhor.';return 'Ainda estou aprendendo. VocÃª pode me ensinar essa resposta na aba Ensinar.'}
function sendMsg(){const input=document.getElementById('userInput');const text=input.value.trim();if(!text)return;addMsg(text,'user');input.value='';setTimeout(()=>addMsg(answer(text),'bot'),350)}
function teachDrak(){const q=document.getElementById('teachQ').value.trim();const a=document.getElementById('teachA').value.trim();if(!q||!a){alert('Preencha pergunta e resposta.');return}memory.unshift({q,a,date:new Date().toLocaleString('pt-BR')});save();document.getElementById('teachQ').value='';document.getElementById('teachA').value='';addMsg('Aprendi: '+q,'bot');openTab('chat')}
function renderMemory(){const el=document.getElementById('memoryList');if(!memory.length){el.innerHTML='<div class="memory-item">A memÃ³ria ainda estÃ¡ vazia.</div>';return}el.innerHTML=memory.map((m,i)=>`<div class="memory-item"><b>${i+1}. ${m.q}</b><div class="small">${m.a}</div><div class="small">${m.date||''}</div></div>`).join('')}
function clearMemory(){if(confirm('Apagar toda a memÃ³ria local do Drak?')){memory=[];save();addMsg('MemÃ³ria local apagada.','bot')}}
function openTab(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.classList.add('active');if(id==='memory')renderMemory()}
function speak(text){try{if(!('speechSynthesis'in window))return;const u=new SpeechSynthesisUtterance(text);u.lang='pt-BR';u.rate=1;window.speechSynthesis.cancel();window.speechSynthesis.speak(u)}catch(e){}}
function listen(){try{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert('Seu navegador não liberou reconhecimento de voz. Digite a mensagem.');return}const r=new SR();r.lang='pt-BR';r.onresult=e=>{document.getElementById('userInput').value=e.results[0][0].transcript;sendMsg()};r.start()}catch(e){alert('NÃ£o consegui acessar o microfone.')}}
addMsg('DRAK online. Fale ou digite uma pergunta. VocÃª tambem pode me ensinar novas respostas.','bot');renderMemory();
</script>
</body>
</html>
