<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DRAK AI 1.1</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#050505;color:#fff;min-height:100vh}.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:22px 16px 96px;background:radial-gradient(circle at top,#5b0b08 0,#130303 28%,#050505 72%)}.top{text-align:center;padding:22px 0 16px}.logo{width:108px;height:108px;margin:0 auto 18px;border-radius:50%;display:grid;place-items:center;font-size:48px;font-weight:900;background:radial-gradient(circle at 35% 30%,#ff3b22,#490505 70%);box-shadow:0 0 38px rgba(255,48,24,.45)}h1{margin:0;font-size:42px;letter-spacing:8px}.sub{margin-top:10px;color:#f1d7d1;font-size:17px}.ver{margin-top:6px;color:#b9aaa7;font-size:15px}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:22px 0}.tab{border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:16px 6px;text-align:center;font-weight:800;background:linear-gradient(180deg,#211816,#100c0b);color:#fff}.tab.active{background:#ff351e;border-color:#ff351e;box-shadow:0 0 22px rgba(255,53,30,.3)}.panel{display:none;flex:1;border:1px solid rgba(255,255,255,.09);border-radius:26px;background:rgba(0,0,0,.45);padding:16px;overflow:hidden}.panel.active{display:flex;flex-direction:column}.chatbox{flex:1;overflow:auto;padding:6px}.msg{max-width:88%;padding:15px 16px;border-radius:20px;margin:10px 0;font-size:17px;line-height:1.35}.bot{background:#1f1f1f;border:1px solid rgba(255,255,255,.08)}.user{margin-left:auto;background:#ff351e}.bar{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:520px;padding:12px 14px 18px;background:linear-gradient(180deg,rgba(5,5,5,.1),#050505 30%);display:flex;gap:10px}.mic,.send{border:0;border-radius:18px;font-weight:900;color:#fff;background:#ff351e}.mic{width:62px;font-size:22px}.send{width:86px;font-size:16px}input,textarea,select{width:100%;border:1px solid rgba(255,255,255,.14);background:#151515;color:#fff;border-radius:18px;padding:16px;font-size:16px;outline:none}textarea{min-height:120px;resize:vertical}.field{margin:10px 0}.btn{width:100%;border:0;border-radius:18px;padding:16px;margin-top:12px;font-weight:900;font-size:16px;color:#fff;background:#ff351e}.small{color:#bfb6b4;font-size:14px;line-height:1.4}.memoryItem{background:#141414;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px;margin:10px 0}.memoryItem b{color:#ffb3a8}.danger{background:#2b2b2b}.status{font-size:13px;color:#cbbfbd;text-align:center;margin-top:8px}@media(max-height:720px){.logo{width:82px;height:82px;font-size:38px}h1{font-size:34px}.top{padding-top:8px}.msg{font-size:16px}}
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="logo">D</div>
    <h1>DRAK AI</h1>
    <div class="sub">Seu assistente inteligente, ensinÃ¡vel e com voz</div>
    <div class="ver">VersÃ£o 1.1 â€¢ Criado por Raphael Bueno</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="openTab('chat')">Chat</button>
    <button class="tab" onclick="openTab('teach')">Ensinar</button>
    <button class="tab" onclick="openTab('memory')">MemÃ³ria</button>
  </div>

  <section id="chat" class="panel active">
    <div id="chatbox" class="chatbox"></div>
  </section>

  <section id="teach" class="panel">
    <div class="small">Ensine o Drak. Ele vai guardar no celular e usar nas prÃ³ximas respostas.</div>
    <div class="field"><input id="q" placeholder="Pergunta ou assunto. Ex: meta de junho"></div>
    <div class="field"><textarea id="a" placeholder="Resposta correta ou informaÃ§Ã£o que o Drak deve lembrar"></textarea></div>
    <button class="btn" onclick="teach()">Salvar ensinamento</button>
    <div id="teachStatus" class="status"></div>
  </section>

  <section id="memory" class="panel">
    <div class="small">Conhecimento salvo no Drak 1.1.</div>
    <div id="memoryList"></div>
    <button class="btn danger" onclick="clearMemory()">Limpar memÃ³ria</button>
  </section>
</div>

<div class="bar">
  <button class="mic" onclick="listen()">ðŸŽ™ï¸</button>
  <input id="prompt" placeholder="Fale ou digite: Drak, qual a meta?" onkeydown="if(event.key==='Enter') send()">
  <button class="send" onclick="send()">Enviar</button>
</div>

<script>
const KEY='drak_memory_v11';
let memory=JSON.parse(localStorage.getItem(KEY)||'[]');
const chatbox=document.getElementById('chatbox');

function save(){localStorage.setItem(KEY,JSON.stringify(memory));renderMemory();}
function normalize(t){return (t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function addMsg(text,who='bot'){const d=document.createElement('div');d.className='msg '+who;d.textContent=text;chatbox.appendChild(d);chatbox.scrollTop=chatbox.scrollHeight;if(who==='bot') speak(text);}
function boot(){addMsg('DRAK online. Fale ou digite uma pergunta. VocÃª tambÃ©m pode me ensinar novas respostas.');renderMemory();}
function findAnswer(text){const n=normalize(text);let best=null;for(const item of memory){const q=normalize(item.q);if(n.includes(q)||q.includes(n)){best=item;break}}return best;}
function send(){const inp=document.getElementById('prompt');const text=inp.value.trim();if(!text)return;inp.value='';addMsg(text,'user');const hit=findAnswer(text);setTimeout(()=>{if(hit){addMsg(hit.a)}else{addMsg('Ainda nÃ£o aprendi isso. VÃ¡ na aba Ensinar e cadastre a resposta correta. Em breve vou conectar com IA real para responder qualquer pergunta.')}},250)}
function teach(){const q=document.getElementById('q').value.trim();const a=document.getElementById('a').value.trim();if(!q||!a){document.getElementById('teachStatus').textContent='Preencha a pergunta e a resposta.';return}memory.unshift({q,a,created:new Date().toLocaleString('pt-BR')});save();document.getElementById('q').value='';document.getElementById('a').value='';document.getElementById('teachStatus').textContent='Ensinamento salvo na memÃ³ria do Drak.';}
function renderMemory(){const box=document.getElementById('memoryList');box.innerHTML='';if(memory.length===0){box.innerHTML='<div class="memoryItem">Nenhum ensinamento salvo ainda.</div>';return}memory.forEach((m,i)=>{const div=document.createElement('div');div.className='memoryItem';div.innerHTML='<b>'+escapeHtml(m.q)+'</b><br>'+escapeHtml(m.a)+'<br><span class="small">'+m.created+'</span>';box.appendChild(div);});}
function clearMemory(){if(confirm('Limpar toda a memÃ³ria local do Drak?')){memory=[];save();}}
function openTab(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.classList.add('active');renderMemory();}
function listen(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){addMsg('Seu navegador nÃ£o liberou reconhecimento de voz. Digite sua pergunta no campo.');return}const r=new SR();r.lang='pt-BR';r.interimResults=false;r.onresult=e=>{document.getElementById('prompt').value=e.results[0][0].transcript;send();};r.onerror=()=>addMsg('NÃ£o consegui ouvir agora. Tente de novo ou digite.');r.start();}
function speak(text){try{if(!('speechSynthesis' in window))return;const u=new SpeechSynthesisUtterance(text);u.lang='pt-BR';u.rate=1;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}catch(e){}}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
boot();
</script>
</body>
</html>
